<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Blog</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Danh sách Blog</h2>
        <a href="/blogs/create" class="btn btn-success">+ Tạo mới</a>
    </div>

    <form id="searchForm" class="row mb-3">
        <div class="col-md-6">
            <input type="text" id="keyword" class="form-control"
                   placeholder="Tìm theo tiêu đề...">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100">Tìm</button>
        </div>
    </form>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tiêu đề</th>
                    <th>Tác giả</th>
                    <th>Danh mục</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody id="blogTable">
                <tr th:each="b : ${blogs.content}">
                    <td th:text="${b.id}"></td>
                    <td th:text="${b.title}"></td>
                    <td th:text="${b.author}"></td>
                    <td th:text="${b.category != null ? b.category.name : ''}"></td>
                    <td>
                        <a th:href="@{'/blogs/edit/' + ${b.id}}" class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{'/blogs/delete/' + ${b.id}}" class="btn btn-danger btn-sm">Xoá</a>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>
    </div>
    <div class="text-center mt-3">
        <button id="loadMore" class="btn btn-primary">Tải thêm</button>
    </div>
</div>
</body>
<script>
    let page = 0;
    $("#searchForm").submit(function (e) {
        e.preventDefault();

        let keyword = $("#keyword").val();
        page = 0;

        $.ajax({
            url: "/api/v1/blogs/search",
            type: "GET",
            data: {keyword: keyword},
            success: function (data) {
                console.log("Search:", data);

                let html = "";
                data.forEach(b => {
                    html += `
                        <tr>
                            <td>${b.id}</td>
                            <td>${b.title}</td>
                            <td>${b.author}</td>
                            <td>${b.category ? b.category.name : ""}</td>
                            <td>
                                <a href="/blogs/edit/${b.id}" class="btn btn-warning btn-sm">Sửa</a>
                                <a href="/blogs/delete/${b.id}" class="btn btn-danger btn-sm">Xoá</a>
                            </td>
                        </tr>
                    `;
                });
                $("#blogTable").html(html);
            },
            error: function (err) {
                console.log("Lỗi search:", err);
            }
        });
    });

    $("#loadMore").click(function () {

        $.ajax({
            url: "/api/v1/blogs/load",
            type: "GET",
            data: {page: page},
            success: function (data) {

                console.log("Page:", page);
                console.log("Data:", data);

                if (data.length === 0) {
                    $("#loadMore").prop("disabled", true).text("Hết dữ liệu");
                    return;
                }

                let html = "";
                data.forEach(b => {
                    html += `
                    <tr>
                        <td>${b.id}</td>
                        <td>${b.title}</td>
                        <td>${b.author}</td>
                        <td>${b.category ? b.category.name : ""}</td>
                        <td>
                            <a href="/blogs/edit/${b.id}" class="btn btn-warning btn-sm">Sửa</a>
                            <a href="/blogs/delete/${b.id}" class="btn btn-danger btn-sm">Xoá</a>
                        </td>
                    </tr>
                `;
                });

                $("#blogTable").append(html);

                page++;
            }
        });
    });
</script>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Sửa Blog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body>

<h1>Chỉnh sửa Blog</h1>

<form th:action="@{/blogs/update}" th:object="${blog}" method="post">
  <input type="hidden" th:field="*{id}"/>

  <label>Tiêu đề:</label><br>
  <input type="text" th:field="*{title}" required><br><br>

  <label>Nội dung:</label><br>
  <textarea th:field="*{content}" rows="5" cols="30"></textarea><br><br>

  <label>Tác giả:</label><br>
  <input type="text" th:field="*{author}"><br><br>

  <button type="submit">Cập nhật</button>
</form>

<br>
<a href="/blogs">Quay lại danh sách</a>

</body>
</html>

</html><!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm</title>
    <th:block th:insert="~{layout/layout.html}"/>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center text-success mb-4">Thêm sản phẩm</h2>
    <form th:action="@{/products/save}" th:object="${product}" method="post">
        <div class="mb-3">
            <label class="form-label">Tên sản phẩm</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên sản phẩm">
        </div>
        <div class="mb-3">
            <label class="form-label">Giá</label>
            <input type="number" th:field="*{price}" class="form-control" placeholder="Nhập giá">
        </div>
        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <input type="text" th:field="*{description}" class="form-control" placeholder="Nhập mô tả">
        </div>
        <div class="mb-3">
            <label class="form-label">Nhà sản xuất</label>
            <input type="text" th:field="*{manufacturer}" class="form-control" placeholder="Nhập hãng">
        </div>
        <div class="d-flex justify-content-between">
            <a href="/products" class="btn btn-secondary"> Quay lại</a>
            <button type="submit" class="btn btn-success"> Lưu</button>
        </div>
    </form>
</div>
</body>
</html>

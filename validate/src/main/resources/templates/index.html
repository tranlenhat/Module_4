<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký User</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="col-md-6 offset-md-3">

        <h2 class="text-center mb-4">Form đăng ký</h2>

        <form th:action="@{/register}" th:object="${userDTO}" method="post">

            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control">
                <small class="text-danger" th:errors="*{firstName}"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control">
                <small class="text-danger" th:errors="*{lastName}"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" th:field="*{phoneNumber}" class="form-control">
                <small class="text-danger" th:errors="*{phoneNumber}"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Tuổi</label>
                <input type="number" th:field="*{age}" class="form-control">
                <small class="text-danger" th:errors="*{age}"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" th:field="*{email}" class="form-control">
                <small class="text-danger" th:errors="*{email}"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Giới tính</label><br>

                <input type="radio" th:field="*{gender}" value="true"> Nam
                <input type="radio" th:field="*{gender}" value="false"> Nữ

                <br>
                <small class="text-danger" th:errors="*{gender}"></small>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary">Đăng ký</button>
            </div>

        </form>

    </div>
</div>

</body>
</html>

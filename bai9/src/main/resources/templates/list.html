<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thư viện sách</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">📚 Thư viện sách</h2>
        <p class="text-muted">Danh sách các đầu sách trong hệ thống</p>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover align-middle">
                <thead class="table-primary">
                <tr class="text-center">
                    <th>#</th>
                    <th>Tên sách</th>
                    <th>Tác giả</th>
                    <th>Số lượng</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="book, stat : ${books}" class="text-center">
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.author}"></td>

                    <td>
                        <span class="badge bg-success" th:if="${book.quantity > 0}"
                              th:text="${book.quantity}"></span>

                        <span class="badge bg-danger" th:if="${book.quantity == 0}">
                            Hết sách
                        </span>
                    </td>

                    <td>
                        <form th:action="@{/borrow/{id}(id=${book.id})}" method="post">
                            <button class="btn btn-primary btn-sm"
                                    th:disabled="${book.quantity == 0}">
                                📖 Mượn
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/return" class="btn btn-warning">
            🔄 Trả sách
        </a>
    </div>

</div>

</body>
</html>
